<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>MERN LAB</title>
	<style>
	body{
		background-color: black;
	}
	h1, h2{
		color: white;
	}
	</style>
</head>
<body>
	<marquee direction="right" scrollamount="100">
		<img src="img.jpg" height="100px">
	</marquee>
	<h1>Audio and Video embedding inside HTML page</h1>
	<h2>Audio Player</h2>
	<audio controls>
		<source src="sample.mp3" type="audio/mpeg">
	</audio>
	<h2>Video Player</h2>
	<video width="75%" height="50%" controls loop=true>
		<source src="sample.mp4" type="video/mp4">
	</video>
</body>
</html>
