<!DOCTYPE html>
<html lang="en">
<head>
<style>
    div h1 {
        color: blue;
    }
    div > p {
        color: red;
    }
    h1 + p {
        font-weight: bold;
    }
    h2 ~ p {
        color: green;
    }
</style>
</head>
<body>
    <div><h1>Descendant Selector</h1></div>
    <div><p>Child Selector</p></div>
    <h1>...</h1>
    <p>Adjacent sibling selector</p>
    <h2>...</h2>
    <p>General sibling selector 1</p>
    <p>General sibling selector 2</p>
</body>
</html>
