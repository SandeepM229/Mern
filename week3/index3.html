<!DOCTYPE html>
<html>
<head>
<title>MERN LAB</title>
<style>
  .c-name { color: blue; }
  .c-hex { color: #0000FF; }
  .c-rgb { color: rgb(0, 0, 255); }
  .c-rgba { color: rgba(0, 0, 255, 1); }
  .c-hsl { color: hsl(255, 100%, 50%); }
  .c-hsla {color: hsla(255, 100%, 50%, 0.7)}
</style>
</head>
<body>
  <p class="c-name">Blue using name (blue).</p>
  <p class="c-hex">Blue using HEX (#0000FF).</p>
  <p class="c-rgb">Blue using RGB (0,0,255).</p>
  <p class="c-rgba">Blue using RGBA (0,0,255,1).</p>
  <p class="c-hsl">Blue using HSL (255, 100%, 50%).</p>
  <p class="c-hsl">Blue using HSLA (255, 100%, 50%, 1).</p>
</body>
</html>
